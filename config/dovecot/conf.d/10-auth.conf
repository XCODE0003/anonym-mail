# Dovecot authentication configuration

disable_plaintext_auth = yes
auth_mechanisms = plain login

# SQL passdb/userdb
passdb {
    driver = sql
    args = /etc/dovecot/dovecot-sql.conf.ext
}

userdb {
    driver = sql
    args = /etc/dovecot/dovecot-sql.conf.ext
}

# Service for Postfix SASL
service auth {
    unix_listener /var/spool/postfix/private/auth {
        mode = 0660
        user = postfix
        group = postfix
    }
    
    # TCP socket for Docker networking
    inet_listener {
        port = 12345
    }
}

# Auth worker for SQL queries
service auth-worker {
    user = vmail
}
