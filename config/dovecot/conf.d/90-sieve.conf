# Dovecot Sieve configuration

plugin {
    # Personal sieve scripts
    sieve = file:~/sieve;active=~/.dovecot.sieve
    
    # Global sieve directory
    sieve_global_dir = /etc/dovecot/sieve/global/
    
    # Default sieve script (if user has none)
    sieve_default = /etc/dovecot/sieve/default.sieve
    sieve_default_name = roundcube
    
    # Sieve extensions
    sieve_extensions = +vacation +imapflags +notify +envelope +body +relational +regex +subaddress +copy +mailbox +variables +enotify +vnd.dovecot.duplicate
    
    # Limits
    sieve_max_script_size = 1M
    sieve_quota_max_scripts = 10
    sieve_quota_max_storage = 5M
}

service managesieve-login {
    inet_listener sieve {
        port = 4190
    }
}

service managesieve {
}
