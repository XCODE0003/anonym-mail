# Anonym Mail — Dovecot configuration
# Privacy-focused IMAP/POP3 server

# Protocols
protocols = imap pop3 lmtp sieve

# Logging - DISABLED for privacy
log_path = /dev/null
info_log_path = /dev/null
debug_log_path = /dev/null
auth_verbose = no
auth_debug = no
mail_debug = no

# SSL/TLS
ssl = required
ssl_cert = </etc/dovecot/certs/fullchain.pem
ssl_key = </etc/dovecot/certs/privkey.pem
ssl_min_protocol = TLSv1.2
ssl_cipher_list = ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
ssl_prefer_server_ciphers = yes

# Mail location
mail_location = maildir:/var/mail/%d/%n
mail_uid = 5000
mail_gid = 5000
first_valid_uid = 5000
last_valid_uid = 5000

# Namespace
namespace inbox {
    inbox = yes
    separator = /
    mailbox Drafts {
        auto = subscribe
        special_use = \Drafts
    }
    mailbox Sent {
        auto = subscribe
        special_use = \Sent
    }
    mailbox Trash {
        auto = subscribe
        special_use = \Trash
    }
    mailbox Junk {
        auto = subscribe
        special_use = \Junk
    }
    mailbox Archive {
        auto = no
        special_use = \Archive
    }
}

# Authentication
auth_mechanisms = plain login
disable_plaintext_auth = yes

passdb {
    driver = sql
    args = /etc/dovecot/dovecot-sql.conf.ext
}

userdb {
    driver = sql
    args = /etc/dovecot/dovecot-sql.conf.ext
}

# Services
service imap-login {
    inet_listener imap {
        port = 0
    }
    inet_listener imaps {
        port = 993
        ssl = yes
    }
}

service pop3-login {
    inet_listener pop3 {
        port = 0
    }
    inet_listener pop3s {
        port = 995
        ssl = yes
    }
}

service lmtp {
    inet_listener lmtp {
        address = *
        port = 24
    }
}

service auth {
    inet_listener {
        address = *
        port = 12345
    }
}

service managesieve-login {
    inet_listener sieve {
        port = 4190
    }
}

service managesieve {
}

# Sieve
protocol sieve {
    managesieve_max_line_length = 65536
}

plugin {
    sieve = file:~/sieve;active=~/.dovecot.sieve
    sieve_max_script_size = 1M
    sieve_quota_max_scripts = 10
    sieve_quota_max_storage = 5M
}

# Include additional configs
!include conf.d/*.conf
