server {
    listen 80;
    server_name localhost;
    
    root /var/www/app/public;
    index index.php;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    access_log off;
    error_log /dev/null;
    
    port_in_redirect off;
    absolute_redirect off;

    # WebSocket proxy for IMAP
    location /ws/ {
        proxy_pass http://ws-proxy:8080/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400;
        proxy_send_timeout 86400;
    }

    # Redirect /webmail and /admin to trailing slash
    location = /webmail {
        return 301 /webmail/;
    }
    
    location = /admin {
        return 301 /admin/;
    }

    # Webmail routes
    location ~ ^/webmail(/.*)?$ {
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/webmail/public/index.php;
        fastcgi_param REQUEST_URI $request_uri;
        include fastcgi_params;
    }

    # Admin routes
    location ~ ^/admin(/.*)?$ {
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/admin/public/index.php;
        fastcgi_param REQUEST_URI $request_uri;
        include fastcgi_params;
    }

    # Static assets
    location /assets/ {
        expires 7d;
    }

    # Main app routes
    location / {
        try_files $uri $uri/ /index.php$is_args$args;
    }

    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_param SCRIPT_FILENAME /var/www/app/public/index.php;
        fastcgi_param REQUEST_URI $request_uri;
        include fastcgi_params;
    }

    location ~ /\. {
        deny all;
    }
}
