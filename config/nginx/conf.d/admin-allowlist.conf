# Admin IP allowlist
# Edit this file to restrict admin access by IP

# Allow localhost
allow 127.0.0.1;
allow ::1;

# Allow Docker network
allow 172.16.0.0/12;
allow 10.0.0.0/8;
allow 192.168.0.0/16;

# Add your trusted IPs here:
# allow 203.0.113.50;
# allow 2001:db8::/32;

# Deny all others
deny all;
