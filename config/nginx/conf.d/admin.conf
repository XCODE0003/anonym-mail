# Admin panel server block
# Protected by: IP allowlist + mTLS + Basic Auth

server {
    listen 8443 ssl;
    listen [::]:8443 ssl;
    http2 on;
    server_name _;

    # TLS with client certificate verification
    ssl_certificate /etc/nginx/certs/admin/server.crt;
    ssl_certificate_key /etc/nginx/certs/admin/server.key;
    ssl_client_certificate /etc/nginx/certs/admin/ca.crt;
    ssl_verify_client on;
    ssl_verify_depth 2;
    
    ssl_protocols TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers on;

    # IP allowlist (configure in .env)
    # Example: allow 10.0.0.0/8; allow 192.168.0.0/16; deny all;
    include /etc/nginx/conf.d/admin-allowlist.conf;

    # Basic auth (additional layer)
    auth_basic "Admin Area";
    auth_basic_user_file /etc/nginx/.htpasswd;

    # Security Headers
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self'; form-action 'self'; frame-ancestors 'none'" always;
    add_header Cache-Control "no-store, no-cache, must-revalidate" always;

    root /var/www/admin/public;
    index index.php;

    # Very strict rate limiting
    limit_req zone=auth burst=3 nodelay;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;
        
        # Pass client cert info to PHP
        fastcgi_param SSL_CLIENT_VERIFY $ssl_client_verify;
        fastcgi_param SSL_CLIENT_S_DN $ssl_client_s_dn;
    }

    location ~ /\. {
        deny all;
    }
}
