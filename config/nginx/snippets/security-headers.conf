# Security headers for all responses

# HSTS
add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

# Content Security Policy (NO JS)
add_header Content-Security-Policy "default-src 'self'; script-src 'none'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; object-src 'none'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; upgrade-insecure-requests;" always;

# Prevent MIME sniffing
add_header X-Content-Type-Options "nosniff" always;

# Prevent framing
add_header X-Frame-Options "DENY" always;

# XSS protection (legacy browsers)
add_header X-XSS-Protection "1; mode=block" always;

# No referrer
add_header Referrer-Policy "no-referrer" always;

# Permissions policy (disable all)
add_header Permissions-Policy "interest-cohort=(), geolocation=(), camera=(), microphone=(), payment=(), usb=(), accelerometer=(), gyroscope=()" always;
