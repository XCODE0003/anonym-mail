# Main website virtual host

server {
    listen 80;
    listen [::]:80;
    server_name anonym-mail-service.test www.anonym-mail-service.test;

    # Redirect to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name anonym-mail-service.test www.anonym-mail-service.test;

    # SSL
    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # OCSP Stapling
    ssl_stapling on;
    ssl_stapling_verify on;

    # Document root
    root /var/www/app/public;
    index index.php;

    # NO ACCESS LOGS
    access_log off;

    # Rate limiting
    limit_req zone=general burst=20 nodelay;

    # Static files
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # PHP handling
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        # Don't pass client IP to PHP
        fastcgi_param REMOTE_ADDR "";
        fastcgi_param HTTP_X_FORWARDED_FOR "";
        fastcgi_param HTTP_X_REAL_IP "";
    }

    # Default location
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Static files (canary, log, gpg)
    location = /canary.asc.txt {
        alias /var/www/app/public/canary.asc.txt;
        default_type text/plain;
    }

    location = /log.txt {
        alias /var/www/app/public/log.txt;
        default_type text/plain;
    }

    location /gpg/ {
        alias /var/www/app/public/gpg/;
        default_type text/plain;
    }

    # Transparency archive
    location /transparency/ {
        alias /var/www/app/public/transparency/;
        autoindex on;
    }

    # Deny dotfiles
    location ~ /\. {
        deny all;
    }
}
