# Admin panel virtual host
# Protected by: IP allowlist + mTLS + Basic Auth

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name admin.anonym-mail-service.test;

    # SSL
    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;

    # mTLS (client certificate)
    ssl_client_certificate /etc/nginx/certs/admin-ca.crt;
    ssl_verify_client on;
    ssl_verify_depth 2;

    # Document root
    root /var/www/admin/public;
    index index.php;

    # NO ACCESS LOGS
    access_log off;

    # IP allowlist (from environment)
    # Uncomment and configure in production:
    # allow 127.0.0.1;
    # allow ::1;
    # deny all;

    # Very strict rate limit
    limit_req zone=auth burst=3 nodelay;

    # Static files
    location ~* \.(css|png|jpg|jpeg|gif|ico|svg)$ {
        expires 1d;
    }

    # PHP handling
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_param REMOTE_ADDR "";

        # Pass client cert info to PHP for additional validation
        fastcgi_param SSL_CLIENT_CERT $ssl_client_cert;
        fastcgi_param SSL_CLIENT_VERIFY $ssl_client_verify;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ /\. {
        deny all;
    }
}
