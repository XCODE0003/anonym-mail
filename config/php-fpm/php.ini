[PHP]
; Error handling
display_errors = Off
log_errors = Off
error_log = /dev/null

; Memory and execution limits
memory_limit = 256M
max_execution_time = 30
max_input_time = 60

; Upload limits
upload_max_filesize = 25M
post_max_size = 26M
max_file_uploads = 10

; Session (Redis-backed, handled in code)
session.save_handler = files
session.save_path = /tmp

; Timezone
date.timezone = UTC

; Opcache
opcache.enable = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 10000
opcache.validate_timestamps = 0

; Security
expose_php = Off
