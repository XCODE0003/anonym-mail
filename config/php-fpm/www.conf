[www]
user = www
group = www

listen = 9000
listen.owner = www
listen.group = www

pm = dynamic
pm.max_children = 20
pm.start_servers = 5
pm.min_spare_servers = 2
pm.max_spare_servers = 10
pm.max_requests = 500

; No access log (privacy)
access.log = /dev/null

; Error log to stderr for Docker
php_admin_value[error_log] = /dev/stderr
php_admin_flag[log_errors] = off

; Security
php_admin_value[disable_functions] = exec,passthru,shell_exec,system,proc_open,popen
