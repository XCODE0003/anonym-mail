# Anonym Mail — Unbound DNS resolver configuration
# Local recursive resolver with DNSSEC

server:
    # Listen only on localhost
    interface: 127.0.0.1
    port: 53
    
    # Access control
    access-control: 127.0.0.0/8 allow
    access-control: 172.16.0.0/12 allow
    access-control: 10.0.0.0/8 allow
    
    # Privacy
    hide-identity: yes
    hide-version: yes
    minimal-responses: yes
    
    # DNSSEC
    auto-trust-anchor-file: "/opt/unbound/etc/unbound/root.key"
    val-clean-additional: yes
    
    # Performance
    num-threads: 2
    msg-cache-slabs: 4
    rrset-cache-slabs: 4
    infra-cache-slabs: 4
    key-cache-slabs: 4
    
    # Cache sizes
    rrset-cache-size: 64m
    msg-cache-size: 32m
    
    # Prefetch
    prefetch: yes
    prefetch-key: yes
    
    # Root hints
    root-hints: "/opt/unbound/etc/unbound/root.hints"
    
    # Logging (minimal)
    verbosity: 0
    log-queries: no
    log-replies: no
    log-local-actions: no

# Forward to authoritative servers (no external DoH/DoT)
forward-zone:
    name: "."
    forward-addr: 9.9.9.9        # Quad9
    forward-addr: 149.112.112.112 # Quad9 secondary
