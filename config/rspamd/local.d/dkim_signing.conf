# Rspamd DKIM signing configuration

enabled = true;

# Sign outgoing mail
sign_authenticated = true;
sign_local = true;

# Use selector from database (format: mailYYYYMM)
use_domain = "envelope";
use_esld = false;

# Key path pattern
path = "/var/lib/rspamd/dkim/$domain.$selector.private";

# Default selector (will be overridden per-domain)
selector = "mail";

# Domains configuration loaded from database
# This is handled by the dkim_map module
